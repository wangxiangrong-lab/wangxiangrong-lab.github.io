  <main class="gallery-page">
    <h1>照片墙</h1>

     <div class="gallery-controls" style="margin:12px 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <label for="thumb-size">缩略图高度：</label>
      <input id="thumb-size" type="range" min="80" max="400" value="160">
      <span id="thumb-size-value">160px</span>
      <button id="thumb-reset" style="margin-left:8px">重置</button>
    </div>

      <a href="images/毕业照202601.jpg" class="gallery-item fixed-size-3cm">
        <img src="images/毕业照202601.jpg" alt="毕业照 2026-01" style="width:5cm;height:5cm;object-fit:cover;display:block;">
        <div class="photo-caption">恭喜团队再添一名博士毕业生和一名硕士毕业生</div>
      </a>

    <div id="lightbox" class="lightbox" aria-hidden="true">
      <button id="lb-close" class="lb-close" aria-label="关闭">×</button>
      <img id="lb-img" src="" alt="">
    </div>
  </main>

  <script src="assets/js/photos.js"></script>
